# This configuration file defines a ConfigMap named "kleva-app-config" in the "app" namespace.
# This will enable us to store non-sensitive configuration data (like environment variables) separately from our application code and secrets.
# ConfigMaps stores non-sensitive environment variables for the app
# Injected into the pod as env vars at runtime

apiVersion: v1
kind: ConfigMap
metadata:
  name: kleva-app-config
  namespace: app
data:
  # .NET environment (Development shows Swagger, Production hides it)
  # App version — overridden by CI/CD pipeline with git commit hash
  ASPNETCORE_ENVIRONMENT: "Development"

  APP_VERSION: "local"
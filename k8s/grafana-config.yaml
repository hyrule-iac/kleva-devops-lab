# ============================
# 1. Datasource: Prometheus
# ============================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1" # El sidecar de Helm buscará esta etiqueta
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-svc.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: false

---
# ============================
# 2. Dashboard Provider
# ============================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'kleva-provider'
        orgId: 1
        folder: 'Kleva'
        type: file
        disableDeletion: false
        editable: true
        allowUiUpdates: true
        updateIntervalSeconds: 10
        foldersFromFilesStructure: true
        options:
          path: /var/lib/grafana/dashboards/kleva

---
# ============================
# 3. Dashboard JSON
# ============================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1" # Vital para que el sidecar lo importe solo
data:
  kleva.json: |
    {
      "title": "Kleva App",
      "uid": "kleva-app",
      "schemaVersion": 38,
      "version": 1,
      "panels": [
        {
          "type": "stat",
          "title": "Total requests",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(kleva_http_requests_total)",
              "legendFormat": "requests"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Uptime (seconds)",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "kleva_uptime_seconds",
              "legendFormat": "uptime"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Request rate (req/sec)",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(kleva_http_requests_total[1m])",
              "legendFormat": "{{ endpoint }}"
            }
          ]
        }
      ]
    }
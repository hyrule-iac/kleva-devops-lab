# Secret stores sensitive data encoded in base64
# In production these would come from AWS Secrets Manager or Vault
# To encode: echo -n "your-value" | base64

apiVersion: v1
kind: Secret
metadata:
  name: kleva-app-secret
  namespace: app
type: Opaque
data:
  # base64 encoded — echo -n "local-secret-key" | base64
  APP_SECRET_KEY: bG9jYWwtc2VjcmV0LWtleQ==
# This Grafana yaml file combines the datasource configuration, dashboard provider, and dashboard definition into a single manifest for easier management.
# This will allow us to deploy Grafana with all its configurations in one go, ensuring that the datasource and dashboard are set up correctly from the start.
# The Dashboard JSON is a simple example that visualizes total requests, 
# Uptime, request rate, request duration, and active requests for the Kleva application using Prometheus metrics.

# ============================
# 1. Datasource: Prometheus
# ============================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-svc.monitoring.svc.cluster.local:9090
        access: proxy
        isDefault: true
        editable: false
---

# ============================
# 2. Dashboard Provider
# ============================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'kleva-provider'
        orgId: 1
        folder: 'Kleva'
        type: file
        disableDeletion: false
        editable: true
        allowUiUpdates: true
        updateIntervalSeconds: 10
        foldersFromFilesStructure: true
        options:
          # Path must match the volumeMount in the Grafana deployment to ensure the sidecar can find the dashboard JSON files
          path: /var/lib/grafana/dashboards/kleva
---
# ============================
# 3. Dashboard JSON
# ============================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: monitoring
data:
  kleva.json: |
    {
      "title": "Kleva App",
      "uid": "kleva-app",
      "schemaVersion": 38,
      "version": 1,
      "panels": [
        {
          "type": "stat",
          "title": "Total requests",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(kleva_http_requests_total)",
              "legendFormat": "requests"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Uptime (seconds)",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "kleva_uptime_seconds",
              "legendFormat": "uptime"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Request rate (req/sec)",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(kleva_http_requests_total[1m])",
              "legendFormat": "{{ endpoint }}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Request duration p95 (seconds)",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(kleva_http_request_duration_seconds_bucket[1m]))",
              "legendFormat": "p95 {{ endpoint }}"
            }
          ]
        },
        {
          "type": "gauge",
          "title": "Active requests",
          "gridPos": { "x": 0, "y": 20, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "kleva_active_requests",
              "legendFormat": "active"
            }
          ]
        }
      ]
    }
---
# ============================
# 4. Grafana Deployment 
# ============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
          - name: GF_SECURITY_ADMIN_USER
            value: "admin"
          - name: GF_SECURITY_ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: grafana-secret
                key: admin-password
          volumeMounts:
            - name: grafana-datasource
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards

            # Path must match the provider configuration in grafana.yaml to ensure the sidecar can find the dashboard JSON files
            - name: grafana-dashboard
              mountPath: /var/lib/grafana/dashboards/kleva

      # A Sidecar container to watch for changes in the dashboard ConfigMap and trigger Grafana to reload dashboards 
      # Contains 3 volumes: one for the datasource, one for the provider, and one for the dashboard JSON files.
      # This volumes will be mounted in the sidecar and the main Grafana container to store the datasource and dashboard configurations. 
      # The sidecar will watch for changes in these volumes, 
      # Allowing us to update dashboards and datasources on the fly without needing to redeploy Grafana.
      
      volumes:
        - name: grafana-datasource
          configMap:
            name: grafana-datasource
        - name: grafana-dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: grafana-dashboard
          configMap:
            name: grafana-dashboard
# ---------------------------------------------------------------------------------------
# CI for Code Quality and Security
# ---------------------------------------------------------------------------------------
name: CI Quality & Security
on:
  workflow_call:

permissions:        
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # ✅ v5 no existe
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4    # ✅ v5 no existe
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: |
          dotnet restore app/kleva-app.csproj   # ✅ apuntar al .csproj exacto
          dotnet build app/kleva-app.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test app/ --no-build

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Debug - Snyk pre-flight
        run: |
          echo "=== .csproj content ==="
          cat app/kleva-app.csproj
          echo "=== project.assets.json ==="
          ls -la app/obj/project.assets.json || echo "NOT FOUND"
          echo "=== dotnet version ==="
          dotnet --version
          echo "=== snyk version ==="
          snyk --version

      - name: Snyk Test
        run: snyk test --all-projects --severity-threshold=high  # 
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5 
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
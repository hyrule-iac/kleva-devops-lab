name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOTNET_VERSION: '8.0.x'
  SONAR_PROJECT_KEY: 'tu-usuario_kleva-devops-lab'

jobs:

  # ─── 1. SEGURIDAD: Snyk SCA ───────────────────────────────────────
  snyk-scan:
    name: Snyk — dependencias
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ./app/kleva-app.csproj

      - name: Snyk scan
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=./app/kleva-app.csproj

  # ─── 2. CALIDAD: SonarQube Quality Gate ───────────────────────────
  sonar-scan:
    name: SonarQube — quality gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarQube begin
        run: |
          dotnet sonarscanner begin \
            /k:"${{ env.SONAR_PROJECT_KEY }}" \
            /o:"tu-org-en-sonarcloud" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io"
        working-directory: ./app

      - name: Build
        run: dotnet build --no-incremental ./app/kleva-app.csproj

      - name: SonarQube end + Quality Gate
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
        working-directory: ./app

  # ─── 3. BUILD + PUSH DOCKER ───────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [snyk-scan, sonar-scan]
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: echo "VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build image
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.version.outputs.VERSION }} \
            -t kleva-app:${{ steps.version.outputs.VERSION }} \
            ./app

      - name: Snyk container scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: kleva-app:${{ steps.version.outputs.VERSION }}
          args: --severity-threshold=high

  # ─── 4. DEPLOY: Terraform ─────────────────────────────────────────
  deploy:
    name: Terraform deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Execute Terraform Init
        run: terraform init
        working-directory: ./infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Execute Terraform Plan
        run: terraform plan -var="app_version=${{ needs.build.outputs.version }}"
        working-directory: ./infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Execute Terraform Apply
        run: terraform apply -auto-approve -var="app_version=${{ needs.build.outputs.version }}"
        working-directory: ./infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
# -----------------------------------------------------------------------------------------
# CODEQL WORKFLOW: Advanced SAST (Static Application Security Testing)
# Trigger: Post-CI success to ensure analysis runs on verified build artifacts.
# -----------------------------------------------------------------------------------------
# Security Strategy:
# 1. Automated Vulnerability Scanning: Identifies security flaws, memory leaks, 
#    and logic vulnerabilities within the C# codebase.
# 2. GitHub Security Integration: Findings are pushed to the "Security" tab for 
#    centralized auditing and risk management.
# 3. DevSecOps Alignment: Operates as a secondary security gate to validate 
#    structural integrity beyond regular unit testing.
# -----------------------------------------------------------------------------------------

# -----------------------------------------------------------------------------------------
# SAST EXECUTION ENGINE: CodeQL Analysis on Ubuntu Runner
# -----------------------------------------------------------------------------------------
# Workflow Optimization & Security:
# 1. Sequential Execution: Gated by CI success to eliminate race conditions and 
#    optimize runner minutes on failed builds.
# 2. Elevated Permissions: Configured for secure write-access to Security Events 
#    and Repository Actions.
# 3. Deep Analysis: Full Git history (fetch-depth: 0) enabled for advanced 
#    path-tracking and vulnerability correlation in the C# codebase.
# -----------------------------------------------------------------------------------------

name: CodeQL
on:
  workflow_call:
permissions:        
  contents: read
  packages: write
jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # Using extended security queries for deeper analysis, and also including quality queries to catch code quality issues
          queries: security-extended,security-and-quality


      - name: Restore & Build for CodeQL
        run: |
          dotnet restore app/
          dotnet build app/ --configuration Release --no-restore

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
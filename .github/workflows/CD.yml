name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # 1. Create Cluster
      - name: Setup k3d Cluster
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.6.0 bash
          k3d cluster create kleva-cluster --port "8080:80@loadbalancer"

          # This configures kubectl to use the new cluster's kubeconfig
          k3d kubeconfig get kleva-cluster > ~/.kube/config

      - name: Apply Kubernetes Manifests
        run: |
          # 1. Apply namespaces first
          kubectl apply -f k8s/namespace.yaml
          
          # 2. Sleep wait for 5 seconds to ensure namespaces are created before applying other resources
          sleep 5
          
          # 3. Apply to Kubernetes - This will apply all resources. If namespaces already exist, it will ignore that error and continue applying the rest. 
       
          kubectl apply -f k8s/
          
          # 4. Final verification 
          kubectl get ns

      # 3. Validation Checks
      - name: Verify Deployment
        run: |
          kubectl get pods -A
          echo "Ephimeral kluster deployment"
# -----------------------------------------------------------------------------------------
# CD PIPELINE: Continuous Deployment & Orchestration
# -----------------------------------------------------------------------------------------
name: CD Deployment

on:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 1. Cluster Setup
      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.6.0 bash

      - name: Create k3d Cluster
        run: |
          k3d cluster create kleva-cluster \
            --port "8080:80@loadbalancer" \
            --wait

      # 2. Argo Rollouts Setup
      - name: Install Argo Rollouts
        run: |
          kubectl create namespace argo-rollouts
          kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
          kubectl wait --for=condition=available deployment/argo-rollouts -n argo-rollouts --timeout=120s
          curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x ./kubectl-argo-rollouts-linux-amd64
          sudo mv ./kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      # 3. Infrastructure with Terraform
      # Terraform creates: namespaces, grafana-secret, grafana helm release, AnalysisTemplate
      - name: Terraform Init & Apply
        working-directory: ./terraform
        env: 
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          terraform init
          terraform apply -auto-approve

      # 4. App Manifests
      # ✅ NO recreamos namespaces ni grafana-secret — Terraform ya los maneja
      - name: Deploy Application Manifests
        run: |
          # Solo el secret de GHCR que Terraform no crea
          kubectl delete secret ghcr-secret -n app --ignore-not-found
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace=app

          # App manifests
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/application/app-rollout.yaml

      # 5. Monitoring Stack
      # ✅ Usamos grafana-config.yaml (tiene datasource + provider + dashboard)
      # ✅ NO aplicamos grafana.yaml ni grafana-datasource.yaml — duplican grafana-datasource ConfigMap
      # ✅ NO aplicamos grafana-secret.yaml — Terraform ya lo crea con el password correcto
      # ✅ NO aplicamos namespace.yaml — Terraform ya crea los namespaces
      - name: Apply Monitoring Stack
        run: |
          kubectl apply -f k8s/monitoring/prometheus.yaml
          kubectl apply -f k8s/monitoring/grafana.yaml  # datasource + provider + dashboard

      # 6. Verification & Wait
      - name: Wait for Rollouts
        run: |
          echo "=== Rollout status ==="
          kubectl argo rollouts status kleva-dotnet -n app --timeout=300s
          
          echo "=== Infrastructure status ==="
          kubectl -n monitoring wait --for=condition=available deployment/prometheus --timeout=120s

      - name: Verify Final Deployment
        run: |
          echo "✅ Deployment completed successfully."
          kubectl get pods -A
          kubectl argo rollouts get rollout kleva-dotnet -n app
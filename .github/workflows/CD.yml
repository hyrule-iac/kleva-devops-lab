# -----------------------------------------------------------------------------------------
# CD PIPELINE: Continuous Deployment & Orchestration
# Trigger: Automated execution upon successful CodeQL completion (Master branch).
# -----------------------------------------------------------------------------------------
# Deployment Order:
# 1. Cluster Setup    : k3d cluster + kubeconfig
# 2. Namespaces       : kubectl applies namespace.yaml (app + monitoring)
# 3. Terraform Apply  : Creates namespaces (via module), Grafana (Helm), AnalysisTemplate
# 4. App Manifests    : ConfigMap, Secret, Argo Rollout
# 5. Monitoring Stack : Prometheus, Grafana ConfigMaps (datasource + dashboard)
# 6. Verification     : Confirms all pods and namespaces are healthy
# -----------------------------------------------------------------------------------------

name: CD Deployment

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # -----------------------------------------------------------------------
      # 1. Spin up a local k3d cluster to emulate a real Kubernetes environment.
      #    Port 8080 maps to the cluster's load balancer for app access.
      # -----------------------------------------------------------------------
    
      - name: Setup k3d Cluster
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.6.0 bash
          k3d cluster create kleva-cluster --port "8080:80@loadbalancer"
          mkdir -p ~/.kube
          k3d kubeconfig get kleva-cluster > ~/.kube/config

      # -----------------------------------------------------------------------
      # 2. Install Argo Rollouts controller + kubectl plugin.
      #    Must exist before applying any Rollout manifests.
      # -----------------------------------------------------------------------
      
      - name: Install Argo Rollouts
        run: |
          kubectl create namespace argo-rollouts
          kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
          kubectl -n argo-rollouts wait --for=condition=available deployment/argo-rollouts --timeout=120s

          # kubectl plugin for manual promotion commands
          curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts-linux-amd64
          sudo mv kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

      # -----------------------------------------------------------------------
      # 3. Terraform: Creates namespaces (app + monitoring), deploys Grafana via
      #    Helm with sidecar autodiscovery, and creates the AnalysisTemplate
      #    "error-rate-check" that the Argo Rollout will reference.
      # -----------------------------------------------------------------------
      
      - name: Terraform Apply
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: |
          cd terraform/
          terraform init
          terraform apply -auto-approve \
            -var="grafana_admin_password=${{ secrets.GRAFANA_PASS }}" \
            -var="environment=dev"

      # -----------------------------------------------------------------------
      # 4. App manifests: ConfigMap + Secret + Argo Rollout.
      #    Namespaces already exist from Terraform, so this is safe.
      # -----------------------------------------------------------------------
      
      - name: Apply App Manifests
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/application/app-rollout.yaml

      # -----------------------------------------------------------------------
      # 5. Monitoring stack: Prometheus (full stack) + Grafana ConfigMaps.
      #    Sidecars in Grafana will autodiscover datasource + dashboard via labels.
      # -----------------------------------------------------------------------
      
      - name: Apply Monitoring Stack
        run: |
          kubectl apply -f k8s/monitoring/prometheus.yaml
          kubectl apply -f k8s/monitoring/grafana-datasource.yaml
          kubectl apply -f k8s/monitoring/grafana-config.yaml

      # -----------------------------------------------------------------------
      # 6. Wait for critical pods to be ready before declaring success.
      # -----------------------------------------------------------------------
      
      - name: Wait for Rollouts
        run: |
          kubectl -n app wait --for=condition=available deployment/kleva-dotnet --timeout=120s || \
            kubectl -n app rollout status rollout/kleva-dotnet --timeout=120s
          kubectl -n monitoring wait --for=condition=available deployment/prometheus --timeout=120s
          kubectl -n monitoring wait --for=condition=available deployment/grafana --timeout=120s

      # -----------------------------------------------------------------------
      # 7. Final verification: print cluster state for pipeline logs.
      # -----------------------------------------------------------------------
      
      - name: Verify Deployment
        run: |
          echo "=== Namespaces ==="
          kubectl get ns

          echo "=== Pods (app) ==="
          kubectl get pods -n app

          echo "=== Pods (monitoring) ==="
          kubectl get pods -n monitoring

          echo "=== Argo Rollout Status ==="
          kubectl argo rollouts get rollout kleva-dotnet -n app

          echo "✅ Hybrid deployment (Terraform + Kubectl + Argo Rollouts) completed successfully."
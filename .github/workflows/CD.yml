name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # 1. Create Cluster
      - name: Setup k3d Cluster
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.6.0 bash
          k3d cluster create kleva-cluster --port "8080:80@loadbalancer"

          # This configures kubectl to use the new cluster's kubeconfig
          k3d kubeconfig get kleva-cluster > ~/.kube/config

      - name: Apply Kubernetes Manifests
        run: |
          # 1. Aplicamos los namespaces primero
          kubectl apply -f k8s/namespace.yaml
          
          # 2. Un pequeño respiro de 5 segundos para que el API Server se asiente
          sleep 5
          
          # 3. Aplicamos TODO el directorio k8s. 
          # Kubernetes ignorará que los namespaces ya existen y creará lo demás.
          kubectl apply -f k8s/
          
          # 4. Verificación final para el log
          kubectl get ns

      # 3. Validation Checks
      - name: Verify Deployment
        run: |
          kubectl get pods -A
          echo "Ephimeral kluster deployment"
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      # 1. Create Cluster
      - name: Setup k3d Cluster
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.6.0 bash
          k3d cluster create mycluster --port "8080:80@loadbalancer"

          # This configures kubectl to use the new cluster's kubeconfig
          k3d kubeconfig get mycluster > ~/.kube/config

      # 2. Apply Manifests

      - name: Apply Kubernetes Manifests
        run: |
          # Crear primero los Namespaces
          # Esperar a que los namespaces estén activos
          kubectl apply -f k8s/namespace.yaml
          
          kubectl wait --for=condition=Active namespace/app --timeout=15s
          kubectl wait --for=condition=Active namespace/monitoring --timeout=15s
          
          # Apply (ConfigMaps, Secrets, Deployments, Services)
          kubectl apply -f k8s/

      # 3. Validation Checks
      - name: Verify Deployment
        run: |
          kubectl get pods -A
          echo "Despliegue completado exitosamente en clúster efímero."
# ---------------------------------------------------------------------------------------
# CI for Code Quality and Security
# ---------------------------------------------------------------------------------------
name: CI Quality & Security
on:
  workflow_call:

permissions:        
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4        # ✅ FIX: v5 no existe
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4    # ✅ FIX: consistente con v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore & Build
        run: |
          dotnet restore app/kleva-app.csproj    # ✅ FIX: apuntar al .csproj exacto
          dotnet build app/kleva-app.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test app/ --no-build

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Snyk Test
        # ✅ FIX: remover --package-manager=nuget, Snyk autodetecta con assets.json presente
        run: snyk test --file=app/kleva-app.csproj --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
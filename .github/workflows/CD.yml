name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 1. Crear el clúster (La base de todo)
      - name: Setup k3d Cluster
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.6.0 bash
          k3d cluster create kleva-cluster --port "8080:80@loadbalancer"
          mkdir -p ~/.kube
          k3d kubeconfig get kleva-cluster > ~/.kube/config

      # 2. TERRAFORM: Crea Namespaces, ConfigMaps y Grafana
      - name: Terraform Apply
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: |
          cd terraform/
          terraform init
          terraform apply -auto-approve \
            -var="grafana_admin_password=${{ secrets.GRAFANA_PASS }}" \
            -var="environment=dev"

      # 3. KUBECTL: Solo despliega la APP (Deployment/Service)
      # Ya no necesitas crear namespaces aquí, TF ya los hizo
      - name: Apply App Manifests
        run: |

          kubectl apply -f k8s/secrets.yaml

      # 4. Verificación Final
      - name: Verify Deployment
        run: |
          kubectl get ns
          kubectl get pods -A
          echo "Despliegue híbrido (Terraform + Kubectl) completado exitosamente."
# -----------------------------------------------------------------------------------------
# CI PIPELINE: Build, Test, and DevSecOps Validation
# Stack: .NET 10.0 | Branch: master
# -----------------------------------------------------------------------------------------
# High-level Flow:
# 1. Environment Setup: Node24 compatibility & .NET 10 SDK initialization.
# 2. Dependency Management: Full Git history fetch (for SonarCloud) & NuGet Restore.
# 3. Build & QA: Release compilation followed by Unit Testing.
# 4. Security (SCA): Snyk scan for vulnerabilities (High-severity threshold).
# 5. Static Analysis (SAST): SonarCloud integration for code quality & maintainability.
# -----------------------------------------------------------------------------------------

name: CI

on:
  push:
    branches: [ "master", "tfmodules"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore app/

      - name: Build
        run: dotnet build app/ --configuration Release --no-restore

      - name: Test
        run: dotnet test app/ --no-build --verbosity normal

      - name: Snyk SCA
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --file=app/kleva-app.csproj --severity-threshold=high

      - name: Check Secret Visibility
        run: |
           if [ -z "${{ secrets.SONAR_TOKEN }}" ]; then
            echo " SONAR_TOKEN secret is EMPTY"
            exit 1
           else
            echo "Secret properly configured"
           fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}